        .time { font-size: 1.2rem; font-weight: 600; color: #333; margin-right: 8px; }
        .arrow { text-align: center; color: #999; font-size: 0.9rem; margin: 8px 0; }

        window.onload = () => {

            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById("targetTime").value = `${h}:${m}`;
        };

        // --- 3. ルート検索 ---
        document.getElementById("searchForm").addEventListener("submit", function(e) {
            e.preventDefault();
            
            const target = document.getElementById("targetTime").value;
            const resBox = document.getElementById("resultBox");
            const errBox = document.getElementById("errorMsg");
            const routeTypeBadge = document.getElementById("routeType");
            const routeSteps = document.getElementById("routeSteps");
            
            resBox.style.display = "none";
            errBox.style.display = "none";

            // ① 直通ルート
            let directResult = null;
            const nextJrDirect = jrDirectData.find(t => t.dep >= target);
            if (nextJrDirect) {
                const nextBus = busData.find(b => b.dep >= nextJrDirect.arr);
                if (nextBus) {
                    directResult = {
                        type: 'direct',
                        finalArr: nextBus.arr,
                        jrDep: nextJrDirect.dep,
                        jr1: nextJrDirect,
                        bus: nextBus
                    };
                }
            }

            // ② 広島経由ルート
            let viaResult = null;
            const nextJrToHiro = jrToHiroshimaData.find(t => t.dep >= target);
            if (nextJrToHiro) {
                const nextJrFromHiro = jrFromHiroshimaData.find(t => t.dep >= nextJrToHiro.arr);
                if (nextJrFromHiro) {
                    const nextBus2 = busData.find(b => b.dep >= nextJrFromHiro.arr);
                    if (nextBus2) {
                        viaResult = {
                            type: 'via',
                            finalArr: nextBus2.arr,
                            jrDep: nextJrToHiro.dep,
                            jr1: nextJrToHiro,
                            jr2: nextJrFromHiro,
                            bus: nextBus2
                        };
                    }
                }
            }

            // ③ 判定
            let bestRoute = null;
            if (directResult && viaResult) {
                if (viaResult.finalArr < directResult.finalArr) {
                    bestRoute = viaResult;
                } else if (viaResult.finalArr === directResult.finalArr && viaResult.jrDep > directResult.jrDep) {
                    bestRoute = viaResult;
                } else {
                    bestRoute = directResult;
                }
            } else {
                bestRoute = directResult || viaResult;
            }

            if (!bestRoute) {
                errBox.innerText = "経路が見つかりません。";
                errBox.style.display = "block";
                return;
            }

            // ④ 描画
            if (bestRoute.type === 'direct') {
                routeTypeBadge.innerText = "直通";
                routeTypeBadge.className = "route-badge direct";
                routeSteps.innerHTML = `
                    <div class="route-step">
                        <div style="font-size: 0.8rem; color: #666; margin-bottom: 4px;">JR (${bestRoute.jr1.dest}行)</div>
                        <span class="time">${bestRoute.jr1.dep}</span> 向洋 発<br>
                        <span class="time">${bestRoute.jr1.arr}</span> 横川 着
                    </div>
                `;
            } else {
                routeTypeBadge.innerText = "広島経由";
                routeTypeBadge.className = "route-badge";
                routeSteps.innerHTML = `
                    <div class="route-step">
                        <div style="font-size: 0.8rem; color: #666; margin-bottom: 4px;">JR (${bestRoute.jr1.dest}行)</div>
                        <span class="time">${bestRoute.jr1.dep}</span> 向洋 発<br>
                        <span class="time">${bestRoute.jr1.arr}</span> 広島 着
                    </div>
                    <div class="arrow">▼</div>
                    <div class="route-step">
                        <div style="font-size: 0.8rem; color: #666; margin-bottom: 4px;">JR (${bestRoute.jr2.dest}行)</div>
                        <span class="time">${bestRoute.jr2.dep}</span> 広島 発<br>
                        <span class="time">${bestRoute.jr2.arr}</span> 横川 着
                    </div>
                `;
            }

            document.getElementById("busDep").innerText = bestRoute.bus.dep;
            document.getElementById("busArr").innerText = bestRoute.bus.arr;
            document.getElementById("busDest").innerText = bestRoute.bus.dest;
            
            resBox.style.display = "block";
